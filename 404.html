<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404: Tín hiệu bị ngắt — LumenForge</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0A0A0C">
  <meta name="color-scheme" content="dark">
  
  <link rel="stylesheet" href="css/design-system.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: radial-gradient(circle at center, rgba(255, 51, 51, 0.1) 0%, rgba(10,10,12,1) 100%);
      position: relative;
      overflow: hidden;
    }
    
    .glitch-text {
      font-size: 8rem;
      font-family: var(--font-heading);
      color: #fff;
      font-weight: bold;
      position: relative;
      margin-bottom: 20px;
      line-height: 1;
      text-shadow: 0 0 20px rgba(255, 51, 51, 0.5);
    }
    .glitch-text::before, .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .glitch-text::before {
      left: 3px;
      text-shadow: -2px 0 red;
      clip: rect(24px, 550px, 90px, 0);
      animation: glitch-anim-2 3s infinite linear alternate-reverse;
    }
    .glitch-text::after {
      left: -3px;
      text-shadow: -2px 0 cyan;
      clip: rect(85px, 550px, 140px, 0);
      animation: glitch-anim 2.5s infinite linear alternate-reverse;
    }

    @keyframes glitch-anim {
      0% { clip: rect(20px, 9999px, 85px, 0); }
      20% { clip: rect(94px, 9999px, 11px, 0); }
      40% { clip: rect(66px, 9999px, 80px, 0); }
      60% { clip: rect(33px, 9999px, 49px, 0); }
      80% { clip: rect(110px, 9999px, 5px, 0); }
      100% { clip: rect(55px, 9999px, 73px, 0); }
    }
    @keyframes glitch-anim-2 {
      0% { clip: rect(65px, 9999px, 100px, 0); }
      20% { clip: rect(3px, 9999px, 55px, 0); }
      40% { clip: rect(100px, 9999px, 20px, 0); }
      60% { clip: rect(44px, 9999px, 99px, 0); }
      80% { clip: rect(88px, 9999px, 33px, 0); }
      100% { clip: rect(12px, 9999px, 77px, 0); }
    }

    .error-desc {
      font-size: 1.2rem;
      color: var(--text-dim);
      font-family: var(--font-mono);
      margin-bottom: 40px;
      max-width: 500px;
      padding: 0 20px;
    }

    .noise-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.8%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');
      opacity: 0.05;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body class="error-page">
  
  <div class="noise-overlay"></div>

  <div style="z-index: 20; display: flex; flex-direction: column; align-items: center;">
    <div class="glitch-text" data-text="404">404</div>
    <p class="error-desc">TÍN HIỆU BỊ NGẮT. Khung hình bạn đang tìm kiếm không tồn tại hoặc đã bị xóa khỏi hệ thống.</p>
    
    <div style="display: flex; gap: 15px;">
      <a href="index.html" class="btn-primary" style="text-decoration: none;">Về Trang Chủ</a>
      <a href="tool-lab.html" class="btn-secondary" style="text-decoration: none;">Đến Tool Lab</a>
    </div>
  </div>

</body>
</html>
