<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="gradient-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA" />
      <stop offset="100%" stop-color="#00A8FF" />
    </linearGradient>
    <linearGradient id="gradient-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#FF5E62" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="128" fill="#0A0A0C" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#gradient-accent)" stroke-width="16" opacity="0.2" />
  
  <!-- Outer Aperture Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#gradient-accent)" stroke-width="18" stroke-linecap="round" />
  
  <!-- Shutter Blades (Minimalist) -->
  <path d="M256 76 L256 160 M383 149 L310 191 M436 256 L352 256 M383 363 L310 321 M256 436 L256 352 M129 363 L202 321 M76 256 L160 256 M129 149 L202 191" 
        stroke="url(#gradient-accent)" stroke-width="12" stroke-linecap="round" opacity="0.8" />
  
  <!-- Center Forge Flame / Lens Core -->
  <path d="M256 180 C290 220 310 260 310 290 C310 320 286 344 256 344 C226 344 202 320 202 290 C202 260 222 220 256 180 Z" 
        fill="url(#gradient-glow)" filter="url(#glow)" />
  <circle cx="240" cy="280" r="15" fill="#FFFFFF" opacity="0.6" filter="url(#glow)" />
</svg>
