<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinematic Title Generator — LumenForge</title>
  <meta name="keywords" content="title generator, poster, cinematic font, letterbox, lumenforge">
  <meta name="description" content="Tự động tạo Poster phim điện ảnh từ ảnh của bạn với Typography chuẩn Hollywood.">
  <meta name="theme-color" content="#0A0A0C">
  <meta name="color-scheme" content="dark">
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/tools.css">
  <style>
    .generator-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: var(--space-xl);
      margin-top: var(--space-lg);
    }
    
    @media (max-width: 900px) {
      .generator-layout { grid-template-columns: 1fr; }
    }

    .canvas-wrapper {
      background: #111;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 500px;
      overflow: hidden;
    }

    canvas {
      max-width: 100%;
      max-height: 70vh;
      object-fit: contain;
    }

    .upload-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: rgba(10,10,12,0.8);
      z-index: 10;
    }

    .btn-upload {
      background: var(--text-primary);
      color: #000;
      padding: 15px 30px;
      border-radius: var(--radius-md);
      font-weight: bold;
      cursor: pointer;
      border: none;
      font-size: 1.1rem;
    }
    .btn-upload:hover { background: var(--accent-cyan); }

    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
    }

    .control-group { margin-bottom: 20px; }
    .control-label { display: block; margin-bottom: 8px; color: var(--text-primary); font-weight: bold; font-size: 0.9rem; }
    
    input[type="text"] {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-color);
      color: #fff;
      border-radius: var(--radius-md);
    }
    
    select {
      width: 100%;
      padding: 12px;
      background: #222;
      border: 1px solid var(--border-color);
      color: #fff;
      border-radius: var(--radius-md);
    }

    /* Cinematic Fonts Loading */
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Bebas+Neue&family=Montserrat:wght@200;400;700&display=swap');

    #btn-download {
      margin-top: 20px;
      width: 100%;
      background: var(--accent-amber);
      color: #000;
      border: none;
      padding: 15px;
      border-radius: var(--radius-md);
      font-weight: bold;
      cursor: pointer;
      font-size: 1.1rem;
    }
    #btn-download:hover { background: #f5b942; }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 15px;
    }
  </style>

  <link rel="canonical" href="https://lumenforge.com/tools/title-generator.html">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Cinematic Title Generator — LumenForge",
    "headline": "Cinematic Title Generator — LumenForge",
    "description": "Tự động tạo Poster phim điện ảnh từ ảnh của bạn với Typography chuẩn Hollywood.",
    "url": "https://lumenforge.com/tools/title-generator.html",
    "author": {
      "@type": "Organization",
      "name": "LumenForge"
    }
  }
  </script>
</head>
<body>

  <nav class="nav" id="main-nav">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo">LUMEN<span class="nav-logo-accent">FORGE</span></a>
      <div class="nav-menu">
        <a href="../index.html" class="nav-link">Trang chủ</a>
        <a href="../tool-lab.html" class="nav-link active">Xưởng Công cụ</a>
      </div>
    </div>
  </nav>

  <main class="container" style="padding-top: 100px; padding-bottom: 50px;">
    
    <div class="tool-header">
      <span class="tool-badge" style="background: rgba(255,255,255,0.1); color: var(--text-primary);">Graphic Design</span>
      <h1>Cinematic Title Generator</h1>
      <p class="tool-desc">Upload ảnh của bạn. Công cụ tự động ép khung điện ảnh 2.35:1 và ghép chữ Typography để tạo Poster phim bom tấn.</p>
    </div>

    <div class="generator-layout">
      
      <div class="canvas-wrapper">
        <canvas id="poster-canvas"></canvas>
        <div class="upload-overlay" id="upload-overlay">
          <input type="file" id="file-input" accept="image/*" style="display: none;">
          <button class="btn-upload" onclick="document.getElementById('file-input').click()">
            Upload Ảnh
          </button>
        </div>
      </div>

      <div class="panel">
        
        <div class="control-group">
          <label class="control-label">TÊN PHIM (Main Title)</label>
          <input type="text" id="inp-title" value="THE LAST VOYAGE" placeholder="Nhập tên phim...">
        </div>

        <div class="control-group">
          <label class="control-label">PHỤ ĐỀ (Subtitle / Tagline)</label>
          <input type="text" id="inp-sub" value="In space, no one can hear you scream." placeholder="Tagline...">
        </div>

        <div class="control-group">
          <label class="control-label">THỂ LOẠI (Font Style)</label>
          <select id="inp-font">
            <option value="Cinzel">Sử thi / Phép thuật (Cinzel)</option>
            <option value="Bebas Neue">Hành động / Giật gân (Bebas)</option>
            <option value="Montserrat">Khoa học viễn tưởng (Montserrat)</option>
            <option value="Times New Roman">Cổ điển / Tội phạm (Times)</option>
          </select>
        </div>

        <div class="control-group">
          <label class="control-label">VỊ TRÍ CHỮ</label>
          <select id="inp-align">
            <option value="center">Giữa khung hình</option>
            <option value="bottom">Góc dưới cùng</option>
            <option value="top">Góc trên cùng</option>
          </select>
        </div>

        <label class="checkbox-group">
          <input type="checkbox" id="chk-letterbox" checked>
          Thêm dải đen Letterbox (2.35:1)
        </label>

        <label class="checkbox-group">
          <input type="checkbox" id="chk-grain" checked>
          Thêm nhiễu hạt (Film Grain)
        </label>

        <button id="btn-download">⬇ Tải Poster</button>
        <button onclick="document.getElementById('file-input').click()" style="width:100%; margin-top:10px; padding:10px; background:transparent; border:1px solid #444; color:#fff; border-radius:4px; cursor:pointer;">Thay ảnh khác</button>
      </div>

    </div>
  </main>

  <script src="../js/tools/title-generator.js"></script>
</body>
</html>
