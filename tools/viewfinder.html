<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Director's Viewfinder — LumenForge</title>
  <meta property="og:description" content="Biến điện thoại của bạn thành ống ngắm đạo diễn (Director's Viewfinder) để dò tìm góc máy và bố cục với tỷ lệ khung hình điện ảnh.">
  <meta property="og:image" content="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=1200&auto=format&fit=crop">
  <meta property="og:title" content="Director's Viewfinder — LumenForge">
  <meta name="keywords" content="viewfinder, nhiếp ảnh, điện ảnh, lumenforge, công cụ">
  <meta name="description" content="Biến điện thoại của bạn thành ống ngắm đạo diễn (Director's Viewfinder) để dò tìm góc máy và bố cục với tỷ lệ khung hình điện ảnh.">
  <meta name="theme-color" content="#0A0A0C">
  <meta name="color-scheme" content="dark">
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/tools.css">
  <style>
    /* Fullscreen Viewfinder Styles */
    body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      font-family: var(--font-sans);
    }

    .video-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      z-index: 1;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }

    /* Aspect Ratio Letterbox Box */
    .ar-overlay {
      position: relative;
      width: 100%;
      height: 100%;
      border: 2px solid var(--accent-cyan);
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.82);
      z-index: 5;
      pointer-events: none;
      transition: height 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Grid Overlay */
    .grid-overlay {
      position: absolute;
      inset: 0;
      display: none;
      pointer-events: none;
    }

    .grid-overlay.active {
      display: block;
    }

    .grid-line-v1, .grid-line-v2, .grid-line-h1, .grid-line-h2 {
      position: absolute;
      background: rgba(255, 255, 255, 0.25);
    }

    .grid-line-v1 { left: 33.33%; top: 0; bottom: 0; width: 1px; }
    .grid-line-v2 { left: 66.66%; top: 0; bottom: 0; width: 1px; }
    .grid-line-h1 { top: 33.33%; left: 0; right: 0; height: 1px; }
    .grid-line-h2 { top: 66.66%; left: 0; right: 0; height: 1px; }

    /* Floating UI elements */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
    }

    .top-bar a {
      color: #fff;
      text-decoration: none;
      font-family: var(--font-mono);
      font-weight: bold;
      letter-spacing: 1px;
      font-size: 0.9rem;
    }

    .btn-camera {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 15, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      padding: 6px 16px;
      display: flex;
      gap: 8px;
      z-index: 10;
      backdrop-filter: blur(15px);
      box-shadow: var(--shadow-xl);
      max-width: 90%;
      overflow-x: auto;
    }

    .ar-btn, #btn-grid {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: bold;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .ar-btn:hover, #btn-grid:hover {
      color: #fff;
    }

    .ar-btn.active {
      background: var(--text-primary);
      color: #000;
    }
    
    #btn-grid.active {
      background: var(--accent-cyan);
      color: #000;
    }

    /* Start Overlay Screen */
    .start-screen {
      position: absolute;
      inset: 0;
      background: #0A0A0C;
      z-index: 20;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .start-screen h1 { margin-bottom: 10px; }
    .start-screen p { color: #888; margin-bottom: 30px; max-width: 400px; }
    .btn-start {
      background: #00d4ff; color: #000; padding: 15px 30px; border-radius: 30px;
      font-size: 1.2rem; border: none; font-weight: bold; cursor: pointer;
      transition: var(--transition);
    }
    .btn-start:hover {
      background: #00b4d8;
    }
  </style>

  <link rel="canonical" href="https://lumenforge.studio/tools/viewfinder.html">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Director's Viewfinder — LumenForge",
    "headline": "Director's Viewfinder — LumenForge",
    "description": "Biến điện thoại của bạn thành ống ngắm đạo diễn (Director's Viewfinder) để dò tìm góc máy và bố cục với tỷ lệ khung hình điện ảnh.",
    "url": "https://lumenforge.studio/tools/viewfinder.html",
    "author": {
      "@type": "Organization",
      "name": "LumenForge"
    }
  }
  </script>
</head>
<body>

  <!-- Start Screen (Needs manual interaction to start camera) -->
  <div class="start-screen" id="start-screen">
    <h1 style="color: #00d4ff;">Director's Viewfinder</h1>
    <p>Công cụ cần quyền truy cập Camera để giả lập ống ngắm điện ảnh. Dữ liệu hình ảnh không bị lưu lại.</p>
    <button class="btn-start" id="btn-start">Mở Camera</button>
    <a href="../tool-lab.html" style="color: #fff; margin-top: 20px; text-decoration: none;">&larr; Trở về Tool Lab</a>
  </div>

  <!-- Camera HUD & Controls -->
  <div class="top-bar">
    <a href="../tool-lab.html">← LUMENFORGE</a>
    <div class="btn-camera" id="btn-flip">↻</div>
  </div>

  <div class="video-container">
    <video id="camera-stream" autoplay playsinline muted></video>
    
    <!-- AR Overlay -->
    <div class="ar-overlay" id="ar-box">
      <!-- Grid -->
      <div class="grid-overlay" id="grid">
        <div class="grid-line-v1"></div>
        <div class="grid-line-v2"></div>
        <div class="grid-line-h1"></div>
        <div class="grid-line-h2"></div>
      </div>
    </div>
  </div>

  <!-- Viewfinder Overlay Controls -->
  <div class="controls">
    <button class="ar-btn active" data-ar="16/9">16:9</button>
    <button class="ar-btn" data-ar="4/3">4:3</button>
    <!-- VIP PRO Aspect Ratios -->
    <button class="ar-btn" data-ar="2.35/1" data-pro="true" style="border: 1px solid rgba(212, 175, 55, 0.35); color: var(--accent-gold);">2.35:1 👑</button>
    <button class="ar-btn" data-ar="2.39/1" data-pro="true" style="border: 1px solid rgba(212, 175, 55, 0.35); color: var(--accent-gold);">2.39:1 Scope 👑</button>
    <!-- VIP PRO Grid Toggle -->
    <button id="btn-grid" style="border-left: 1px solid rgba(255,255,255,0.15); border-radius: 0; border-top: none; border-bottom: none; border-right: none; color: var(--accent-cyan);"># Lưới 👑 PRO</button>
  </div>

  <script src="../js/common.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/checkout.js"></script>
  <script src="../js/tools/viewfinder.js"></script>
</body>
</html>
